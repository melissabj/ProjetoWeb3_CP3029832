<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="container">
        <h1>Verificar Código</h1>
        <p>Digite o código de 6 dígitos enviado para o e-mail: <strong id="display-email"></strong></p>

        <form id="verify-form">
            <input type="hidden" id="email" name="email">

            <label for="code">Código de Verificação</label>
            <input type="text" id="code" name="code" required maxlength="6" pattern="[0-9]{6}" placeholder="000000" style="text-align: center; font-size: 20px; letter-spacing: 4px;">

            <button type="submit">Verificar Código</button>
        </form>

        <p id="error-msg" class="error" hidden></p>
        <p><a href="/">Voltar ao início</a></p>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const flow = params.get('flow') || 'login';

        if (!email) {
            window.location.href = '/';
        } else {
            document.getElementById('email').value = email;
            document.getElementById('display-email').textContent = email;
        }

        document.getElementById('verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value.trim();
            const errorMsg = document.getElementById('error-msg');
            errorMsg.hidden = true;

            try {
                const response = await fetch('/api/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Código incorreto ou expirado.');
                }

                // Salva o JWT com segurança no cliente
                sessionStorage.setItem('token', data.token);

                // Decisão inteligente de rota com base no fluxo escolhido na Home
                if (flow === 'cadastro') {
                    window.location.href = '/register';
                } else {
                    window.location.href = '/dashboard';
                }
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.hidden = false;
            }
        });
    </script>
</body>
</html>
