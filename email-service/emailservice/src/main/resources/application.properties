server.port=8082
spring.application.name=email-service

# Configuração do Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/ms_email?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=seu_usuario
spring.datasource.password=sua_senha
spring.jpa.hibernate.ddl-auto=update

# CloudAMQP
spring.rabbitmq.host=beaver.rmq.cloudamqp.com
spring.rabbitmq.port=5671
spring.rabbitmq.username=seu_usuario_ou_vhost
spring.rabbitmq.password=sua_senha_do_rabbit
spring.rabbitmq.virtual-host=seu_usuario_ou_vhost
spring.rabbitmq.ssl.enabled=true
spring.rabbitmq.connection-timeout=5000
broker.queue.email.name=default.email

# --- Configuração do SMTP (Gmail) ---
# Dica: Use "App Passwords" do Google, nunca sua senha de login pessoal
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seu_email@gmail.com
spring.mail.password=sua_senha_de_app_do_google
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
